name: Checks

on: [pull_request]

permissions:
  contents: read
  pull-requests: read

jobs:
  checks:
    runs-on: ubuntu-latest
    environment: partner
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install
      - name: Install dependencies
        run: uv sync --frozen
      - name: Lint
        run: uv run ruff check .
      - name: Format
        run: uv run ruff format .
      - name: Type check
        run: uv run mypy app
      - name: Export requirements for audit
        run: uv export --no-hashes --format requirements-txt -o requirements.txt
      - name: Audit
        uses: pypa/gh-action-pip-audit@v1.1.0
        with:
          inputs: requirements.txt
      - name: Test
        run: uv run pytest
      - name: Build
        run: uv build
